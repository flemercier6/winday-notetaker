name: WindayNotetaker
options:
  bundleIdPrefix: com.winday
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # <- set your Apple Developer Team ID here (or in Xcode UI)
    CODE_SIGN_STYLE: Automatic

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

targets:
  WindayNotetaker:
    type: application
    platform: macOS
    sources:
      - path: WindayNotetaker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.winday.notetaker
        INFOPLIST_FILE: WindayNotetaker/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: WindayNotetaker/Resources/WindayNotetaker.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Entitlements are hand-maintained at the path below (see CODE_SIGN_ENTITLEMENTS).
